<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kak Effa Facilities Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="css/style.css" />
    <style>
        [data-page] { cursor: pointer; }
    </style>
</head>
<body>
    <div id="app">
        <div style="display:flex;min-height:100vh">
            <div style="width:240px;padding:20px;border-right:1px solid var(--border);flex-shrink:0">
                <div class="skeleton" style="height:36px;width:36px;border-radius:10px;margin-bottom:24px"></div>
                <div class="skeleton" style="height:12px;width:80px;margin-bottom:16px;border-radius:4px"></div>
                <div class="skeleton" style="height:14px;width:140px;margin-bottom:8px;border-radius:4px"></div>
                <div class="skeleton" style="height:14px;width:120px;margin-bottom:8px;border-radius:4px"></div>
                <div class="skeleton" style="height:14px;width:130px;margin-bottom:8px;border-radius:4px"></div>
                <div class="skeleton" style="height:14px;width:110px;margin-bottom:8px;border-radius:4px"></div>
            </div>
            <div style="flex:1;padding:24px">
                <div class="skeleton" style="height:18px;width:200px;margin-bottom:24px;border-radius:4px"></div>
                <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:24px">
                    <div class="skeleton" style="height:80px;border-radius:12px"></div>
                    <div class="skeleton" style="height:80px;border-radius:12px"></div>
                    <div class="skeleton" style="height:80px;border-radius:12px"></div>
                </div>
                <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px">
                    <div class="skeleton" style="height:320px;border-radius:12px"></div>
                    <div class="skeleton" style="height:320px;border-radius:12px"></div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
    <script src="js/supabase.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/data.js"></script>
    <script src="js/charts.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
