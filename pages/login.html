<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — Kak Efa Facilities</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/style.css" />
  <style>
    .login-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--surface);
      padding: 24px;
    }
    .login-card {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 40px 36px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 4px 12px -2px rgba(15, 23, 42, 0.05), 0 2px 6px -1px rgba(15, 23, 42, 0.03);
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .login-card:hover {
      border-color: #cbd5e1;
      box-shadow: 0 10px 25px -5px rgba(15, 23, 42, 0.08);
    }
    .login-logo {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 28px;
    }
    .login-logo-icon {
      width: 42px; height: 42px;
      background: var(--accent);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-weight: 700;
      font-size: 15px;
      flex-shrink: 0;
      box-shadow: 0 2px 4px rgba(37, 99, 235, 0.2);
    }
    .login-logo-text {
      font-size: 20px;
      font-weight: 700;
      color: var(--text-1);
      letter-spacing: -0.01em;
    }
    .login-logo-text span {
      display: block;
      font-size: 12px;
      font-weight: 400;
      color: var(--text-3);
      margin-top: 0px;
    }
    .login-title {
      font-size: 22px;
      font-weight: 600;
      color: var(--text-1);
      margin-bottom: 4px;
    }
    .login-subtitle {
      font-size: 14px;
      color: var(--text-2);
      margin-bottom: 28px;
    }
    .login-error {
      background: var(--red-bg);
      border: 1px solid #FECACA;
      border-radius: var(--radius);
      padding: 10px 14px;
      font-size: 13px;
      color: var(--red);
      margin-bottom: 16px;
      display: none;
    }
    .login-footer {
      text-align: center;
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 28px;
    }
    .loading-dots::after {
      content: '';
      animation: dots 1.2s steps(4, end) infinite;
    }
    @keyframes dots {
      0%  { content: ''; }
      25% { content: '.'; }
      50% { content: '..'; }
      75% { content: '...'; }
    }
  </style>
</head>
<body>
<div class="login-page">
  <div class="login-card">
    <div class="login-logo">
      <div class="login-logo-icon">KF</div>
      <div class="login-logo-text">
        Kak Effa
        <span>Facilities Dashboard</span>
      </div>
    </div>

    <h1 class="login-title">Welcome back</h1>
    <p class="login-subtitle">Accounts can only access the system if the user exists in the database</p>

    <div id="error-box" class="login-error"></div>

    <form id="login-form" autocomplete="on">
      <div class="form-group">
        <label for="email">Email address</label>
        <input type="email" id="email" name="email" placeholder="muhdsyakir@gmail.com" required autofocus />
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="password" required />
      </div>
      <button type="submit" id="btn-login" class="btn-primary" style="width:100%;justify-content:center;margin-top:4px">Sign in</button>
    </form>

    <p class="login-footer">@syaakiirr</p>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../js/supabase.js"></script>
<script>
  (async () => {
    const { data: { session } } = await supabaseClient.auth.getSession();
    if (session) window.location.href = '../index.html';
  })();

  const form     = document.getElementById('login-form');
  const btnLogin = document.getElementById('btn-login');
  const errorBox = document.getElementById('error-box');

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    errorBox.style.display = 'none';
    btnLogin.disabled = true;
    btnLogin.innerHTML = 'Signing in<span class="loading-dots"></span>';

    const email    = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;

    const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password });

    if (error) {
      errorBox.textContent = error.message === 'Invalid login credentials'
        ? 'Incorrect email or password. Please try again.'
        : error.message;
      errorBox.style.display = 'block';
      btnLogin.disabled = false;
      btnLogin.innerHTML = 'Sign in';
      return;
    }

    window.location.href = '../index.html';
  });
</script>
</body>
</html>
